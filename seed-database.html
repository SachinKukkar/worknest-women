<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkNest - Database Seeder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            color: #155724;
            display: block;
        }
        .result.error {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
            display: block;
        }
        .credentials {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
        }
        .credentials div {
            margin: 8px 0;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌸 WorkNest Database Seeder</h1>
        <p>This tool will initialize your production database with demo data including users, jobs, skills, and transactions.</p>
        
        <div class="input-group">
            <label for="apiUrl">Backend API URL:</label>
            <input 
                type="text" 
                id="apiUrl" 
                placeholder="https://your-api.onrender.com"
                value="https://worknest-api-gxb1.onrender.com"
            >
        </div>

        <button onclick="seedDatabase()" id="seedBtn">
            🌱 Seed Database
        </button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #667eea;">Seeding database...</p>
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        async function seedDatabase() {
            const apiUrl = document.getElementById('apiUrl').value.trim();
            const resultDiv = document.getElementById('result');
            const loadingDiv = document.getElementById('loading');
            const seedBtn = document.getElementById('seedBtn');

            if (!apiUrl) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Please enter your backend API URL';
                return;
            }

            // Show loading
            loadingDiv.style.display = 'block';
            resultDiv.style.display = 'none';
            seedBtn.disabled = true;

            try {
                const response = await fetch(`${apiUrl}/api/seed/init`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                loadingDiv.style.display = 'none';
                seedBtn.disabled = false;

                if (data.success) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h3>✅ Database Seeded Successfully!</h3>
                        <p><strong>Created:</strong></p>
                        <ul>
                            <li>${data.data.skills} Skills</li>
                            <li>${data.data.users} Users</li>
                            <li>${data.data.jobs} Jobs</li>
                            <li>${data.data.applications} Applications</li>
                            <li>${data.data.transactions} Transactions</li>
                        </ul>
                        <div class="credentials">
                            <strong>🔑 Demo Credentials:</strong>
                            <div>👩 Woman: ${data.credentials.woman.email} / ${data.credentials.woman.password}</div>
                            <div>🏢 Employer: ${data.credentials.employer.email} / ${data.credentials.employer.password}</div>
                            <div>🔑 Admin: ${data.credentials.admin.email} / ${data.credentials.admin.password}</div>
                        </div>
                        <p style="margin-top: 15px;"><strong>Next:</strong> Go to your app and login!</p>
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `
                        <h3>❌ Seeding Failed</h3>
                        <p>${data.message}</p>
                        ${data.message.includes('already seeded') ? 
                            '<p><strong>Note:</strong> Your database is already seeded. You can login with the demo credentials!</p>' : 
                            '<p>Check your backend logs in Render dashboard for more details.</p>'
                        }
                    `;
                }
            } catch (error) {
                loadingDiv.style.display = 'none';
                seedBtn.disabled = false;
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h3>❌ Connection Error</h3>
                    <p>${error.message}</p>
                    <p><strong>Possible causes:</strong></p>
                    <ul>
                        <li>Backend URL is incorrect</li>
                        <li>Backend is not deployed yet</li>
                        <li>Backend is sleeping (wait 30-60 seconds and try again)</li>
                        <li>CORS is not configured properly</li>
                    </ul>
                `;
            }
        }

        // Allow Enter key to submit
        document.getElementById('apiUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                seedDatabase();
            }
        });
    </script>
</body>
</html>
